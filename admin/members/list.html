<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>회원 관리 | MOMO COFFEE</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/admin/admin-layout.css">
  <link rel="stylesheet" href="/admin/dashboard-shell.css">
  <link rel="stylesheet" href="/admin/members/list.css">
</head>
<body data-admin-page="members">
  <div class="admin-app">
    <main class="admin-content member-management-page">
      <header class="member-heading">
        <p class="admin-eyebrow">MEMBER MANAGEMENT</p>
        <h1>회원 관리</h1>
        <p>회원 정보를 한눈에 확인하고 효율적으로 관리하세요.</p>
      </header>

      <section id="memberStats" class="member-stats" aria-label="회원 등급 현황"></section>

      <section class="member-toolbar" aria-label="회원 검색 및 필터">
        <label class="member-search"><span class="sr-only">회원 검색</span><input id="memberSearch" type="search" placeholder="이름, 이메일, 전화번호 검색" autocomplete="off"><i aria-hidden="true"></i></label>
        <label><span>등급</span><select id="gradeFilter"><option value="">전체 등급</option><option>WELCOME</option><option>SILVER</option><option>GOLD</option><option>VIP</option></select></label>
        <label><span>가입일</span><select id="joinFilter"><option value="">전체 가입일</option><option value="30">최근 30일</option><option value="90">최근 90일</option><option value="365">최근 1년</option></select></label>
        <label><span>상태</span><select id="statusFilter"><option value="">전체 상태</option><option value="active">활성</option><option value="inactive">비활성</option></select></label>
        <label><span>정렬</span><select id="memberSort"><option value="joined">최근 가입순</option><option value="spent">누적 구매금액순</option><option value="orders">주문횟수순</option><option value="grade">회원등급순</option></select></label>
        <button id="resetFilters" class="filter-reset" type="button" aria-label="회원 검색 필터 초기화">초기화</button>
      </section>

      <section class="member-panel" aria-labelledby="memberListTitle">
        <header class="member-panel-heading">
          <div><p class="admin-eyebrow">CUSTOMER DIRECTORY</p><h2 id="memberListTitle">회원 목록</h2></div>
          <p id="memberResultCount" aria-live="polite">총 0명</p>
        </header>
        <div class="member-table-wrap">
          <table class="member-table">
            <thead><tr><th>회원 정보</th><th>등급</th><th>주문</th><th>누적 구매금액</th><th>포인트</th><th>쿠폰</th><th>가입일</th><th>최근 접속</th><th>상태</th><th>관리</th></tr></thead>
            <tbody id="memberList"></tbody>
          </table>
        </div>
        <div id="memberEmpty" class="member-empty" hidden>조건에 맞는 회원이 없습니다.</div>
        <footer class="member-pagination-footer">
          <p id="memberTotalText">총 회원 0명</p>
          <nav id="memberPagination" class="member-pagination" aria-label="회원 페이지"></nav>
          <label><span>페이지당 표시</span><select id="pageSize"><option value="10">10개씩 보기</option><option value="20">20개씩 보기</option><option value="30">30개씩 보기</option></select></label>
        </footer>
      </section>
    </main>
  </div>

  <div id="memberEditModal" class="member-edit-backdrop" hidden>
    <section class="member-edit-modal" role="dialog" aria-modal="true" aria-labelledby="memberEditTitle">
      <header><div><p class="admin-eyebrow">EDIT MEMBER</p><h2 id="memberEditTitle">회원 정보 수정</h2></div><button type="button" data-edit-close aria-label="회원 수정 닫기">×</button></header>
      <form id="memberEditForm">
        <input type="hidden" name="memberId">
        <label><span>이름</span><input name="name" maxlength="40" required></label>
        <label><span>이메일</span><input name="email" type="email" readonly></label>
        <label><span>전화번호</span><input name="phone" maxlength="20"></label>
        <label><span>생년월일</span><input name="birthDate" type="date"></label>
        <p>이메일은 주문·쿠폰·문의 데이터 연결을 위해 변경할 수 없습니다.</p>
        <div><button type="button" class="secondary-action" data-edit-close>취소</button><button type="submit" class="primary-action">변경 저장</button></div>
      </form>
    </section>
  </div>

  <script src="/js/data.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/admin-activity.js"></script>
  <script src="/js/admin-notifications.js"></script>
  <script src="/admin/admin-layout.js?v=20260715-3"></script>
  <script src="/admin/members/list.js"></script>
</body>
</html>
