<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>메뉴 추가 | MOMO COFFEE</title><link rel="stylesheet" href="/css/variables.css"><link rel="stylesheet" href="/admin/admin-layout.css"><link rel="stylesheet" href="/admin/menus/create.css"><link rel="stylesheet" href="/admin/menus/edit.css"></head>
<body data-admin-page="menus"><div class="admin-app"><main class="admin-content"><section class="page-heading"><div><p class="admin-eyebrow">CREATE MENU</p><h1>메뉴 추가</h1><p>판매할 메뉴의 기본 정보와 이미지를 등록합니다.</p></div><a class="secondary-button" href="/admin/menus/list.html">목록</a></section>
<form id="menuForm" class="form-panel"><label class="form-field"><span class="form-label">메뉴명</span><input name="name" required maxlength="60" placeholder="예: Hazelnut Latte"></label><label class="form-field"><span class="form-label">카테고리</span><select name="category" required id="categorySelect"></select></label><label class="form-field"><span class="form-label">가격</span><input name="price" required type="number" min="0" step="100" placeholder="4500"></label><label class="form-field form-field-wide"><span class="form-label">설명</span><textarea name="description" required maxlength="240" placeholder="메뉴 설명을 입력하세요."></textarea></label>
<div class="form-field form-field-wide image-upload-field"><span class="form-label">메뉴 이미지</span><div class="image-upload-box"><img id="imagePreview" alt="선택한 메뉴 이미지 미리보기" hidden><div><label class="image-file-button" for="imageFile">이미지 선택</label><input id="imageFile" name="imageFile" type="file" accept="image/jpeg,image/png,image/webp"><p>JPG, PNG, WEBP · 최대 2MB</p><button id="removeImage" type="button" hidden>이미지 제거</button></div></div></div><input name="image" type="hidden"><p id="formError" class="form-error" role="alert" hidden></p><div class="form-actions"><button class="primary-button" type="submit">저장</button><a class="secondary-button" href="/admin/menus/list.html">취소</a></div></form>
</main></div><script src="/js/data.js"></script><script src="/js/utils.js"></script><script src="/js/admin-activity.js"></script><script src="/js/admin-notifications.js"></script><script src="/admin/admin-layout.js?v=20260715-3"></script><script src="/admin/menus/create.js"></script></body></html>
