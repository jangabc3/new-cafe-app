<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Menu | Cafe Admin</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/admin/menus/create.css">
  </head>
  <body data-admin-page="menus">
    <header class="admin-header">
      <a class="brand" href="/admin/menus/list.html" aria-label="Menu admin home">
        <img src="/assets/images/momo-header-logo.png?v=5" alt="MOMO COFFEE" class="site-logo-image">
        <span>Cafe Admin</span>
      </a>
      <nav class="admin-nav" aria-label="Admin navigation">
        <a class="is-active" href="/admin/menus/list.html">Menus</a>
        <a href="/admin/qna/list.html">문의 관리</a>
        <a href="/admin/">Dashboard</a>
      </nav>
    </header>

    <main class="admin-shell form-shell">
      <section class="page-heading">
        <div>
          <p class="eyebrow">Create Menu</p>
          <h1>메뉴 추가</h1>
        </div>
        <a class="secondary-button" href="/admin/menus/list.html">목록</a>
      </section>

      <form id="menuForm" class="form-panel">
        <label class="form-field">
          <span class="form-label">메뉴명</span>
          <input name="name" required maxlength="60" placeholder="예: Hazelnut Latte">
        </label>
        <label class="form-field">
          <span class="form-label">카테고리</span>
          <select name="category" required id="categorySelect"></select>
        </label>
        <label class="form-field">
          <span class="form-label">가격</span>
          <input name="price" required type="number" min="0" step="100" placeholder="4500">
        </label>
        <label class="form-field form-field-wide">
          <span class="form-label">설명</span>
          <textarea name="description" required maxlength="240" placeholder="메뉴 설명을 입력하세요."></textarea>
        </label>
        <label class="form-field form-field-wide">
          <span class="form-label">이미지 URL</span>
          <input name="image" type="url" placeholder="https://example.com/menu.jpg">
        </label>
        <p id="formError" class="form-error" hidden></p>
        <div class="form-actions">
          <button class="primary-button" type="submit">저장</button>
          <a class="secondary-button" href="/admin/menus/list.html">취소</a>
        </div>
      </form>
    </main>

    <script src="../../js/data.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="/admin/menus/create.js"></script>
    <script src="../../js/footer.js"></script>
  <script src="/admin/admin-layout.js"></script></body>
</html>
