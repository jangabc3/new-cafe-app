<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>메뉴 수정 | MOMO COFFEE</title><link rel="stylesheet" href="/css/variables.css"><link rel="stylesheet" href="/admin/admin-layout.css"><link rel="stylesheet" href="/admin/menus/edit.css"></head>
<body data-admin-page="menus"><div class="admin-app"><main class="admin-content">
<header class="menu-page-heading"><div><p class="admin-eyebrow">EDIT MENU</p><h1 id="pageTitle">메뉴 수정</h1><p>기존 판매 상태는 유지하고 메뉴 정보를 수정합니다.</p></div><a class="secondary-button" href="/admin/menus/list.html">목록으로</a></header>
<form id="menuForm" class="form-panel" hidden>
<label class="form-field"><span>메뉴명</span><input name="name" required maxlength="60"></label><label class="form-field"><span>카테고리</span><select name="category" required id="categorySelect"></select></label><label class="form-field"><span>가격</span><input name="price" required type="number" min="0" step="100"></label><label class="form-field form-field-wide"><span>설명</span><textarea name="description" required maxlength="240"></textarea></label>
<div class="form-field form-field-wide image-upload-field"><span>메뉴 이미지</span><div class="image-upload-box"><img id="imagePreview" alt="선택한 메뉴 이미지 미리보기"><div><label class="image-file-button" for="imageFile">이미지 선택</label><input id="imageFile" name="imageFile" type="file" accept="image/jpeg,image/png,image/webp"><p>JPG, PNG, WEBP · 최대 2MB</p><button id="removeImage" type="button">이미지 제거</button></div></div></div><input name="image" type="hidden"><p id="formError" class="form-error" role="alert" hidden></p>
<div class="form-actions"><button class="primary-button" type="submit">변경 저장</button><a id="detailLink" class="secondary-button" href="/admin/menus/list.html">상세 보기</a></div></form>
</main></div><script src="/js/data.js"></script><script src="/js/utils.js"></script><script src="/js/admin-activity.js"></script><script src="/js/admin-notifications.js"></script><script src="/admin/admin-layout.js?v=20260715-3"></script><script src="/admin/menus/edit.js"></script></body></html>
