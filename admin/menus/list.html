<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu Admin | Cafe</title>
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="list.css">
  </head>
  <body>
    <header class="admin-header">
      <a class="brand" href="list.html" aria-label="Menu admin home">
        <span class="brand-mark">C</span>
        <span>Cafe Admin</span>
      </a>
      <nav class="admin-nav" aria-label="Admin navigation">
        <a class="is-active" href="list.html">Menus</a>
        <a href="../index.html">Dashboard</a>
      </nav>
    </header>

    <main class="admin-shell">
      <section class="page-heading">
        <div>
          <p class="eyebrow">Menu Management</p>
          <h1>메뉴 목록</h1>
        </div>
        <a class="primary-button" href="create.html">메뉴 추가</a>
      </section>

      <section class="toolbar" aria-label="Menu filters">
        <label class="field search-field">
          <span>검색</span>
          <input id="searchInput" type="search" placeholder="메뉴명 또는 설명">
        </label>
        <label class="field">
          <span>카테고리</span>
          <select id="categoryFilter">
            <option value="all">전체</option>
          </select>
        </label>
      </section>

      <section class="summary-grid" aria-label="Menu summary">
        <article>
          <span>전체 메뉴</span>
          <strong id="totalCount">0</strong>
        </article>
        <article>
          <span>현재 보기</span>
          <strong id="visibleCount">0</strong>
        </article>
        <article>
          <span>평균 가격</span>
          <strong id="averagePrice">0원</strong>
        </article>
      </section>

      <section class="table-panel" aria-label="Menu list">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>메뉴</th>
                <th>카테고리</th>
                <th>가격</th>
                <th>설명</th>
                <th class="actions-col">관리</th>
              </tr>
            </thead>
            <tbody id="menuTableBody"></tbody>
          </table>
        </div>
        <p id="emptyState" class="empty-state" hidden>조건에 맞는 메뉴가 없습니다.</p>
      </section>
    </main>

    <script src="../../js/data.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="list.js"></script>
  </body>
</html>
