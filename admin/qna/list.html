<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>문의 관리 | MOMO COFFEE</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/admin/admin-layout.css">
  <link rel="stylesheet" href="/admin/dashboard-shell.css">
  <link rel="stylesheet" href="/admin/qna/list.css">
</head>
<body data-admin-page="qna">
  <div class="admin-app">
    <main class="admin-content customer-care-page">
      <header class="qna-admin-head"><p class="admin-eyebrow">CUSTOMER CARE</p><h1>문의 관리</h1><p>고객 문의를 빠르게 확인하고 응답하세요.</p></header>
      <section id="qnaSummary" class="qna-summary" aria-label="문의 현황"></section>
      <section class="qna-filters" aria-label="문의 검색 및 필터">
        <label class="qna-search"><span class="sr-only">문의 검색</span><input id="qnaSearch" type="search" placeholder="회원명, 이메일, 제목 또는 내용 검색" autocomplete="off"><i aria-hidden="true"></i></label>
        <label><span>상태</span><select id="statusFilter"><option value="">전체 상태</option><option value="PENDING">답변 대기</option><option value="ANSWERED">답변 완료</option></select></label>
        <label><span>문의 유형</span><select id="categoryFilter"><option value="">전체 유형</option></select></label>
        <label><span>기간</span><select id="periodFilter"><option value="all">전체 기간</option><option value="today">오늘</option><option value="7">최근 7일</option><option value="30">최근 30일</option></select></label>
        <label><span>정렬</span><select id="sortFilter"><option value="pending">답변 대기 우선</option><option value="desc">최신순</option><option value="asc">오래된순</option></select></label>
        <button id="resetQnaFilters" type="button">초기화</button>
      </section>
      <section class="qna-list-panel" aria-labelledby="qnaListTitle">
        <header><div><p class="admin-eyebrow">INQUIRY QUEUE</p><h2 id="qnaListTitle">문의 목록</h2></div><p id="qnaResultCount" aria-live="polite">총 0건</p></header>
        <div class="qna-table-wrap"><table class="qna-table"><thead><tr><th>회원</th><th>문의 제목</th><th>문의 유형</th><th>접수 시간</th><th>상태</th><th>담당자</th><th>작업</th></tr></thead><tbody id="qnaRows"></tbody></table></div>
        <div id="qnaEmpty" class="qna-empty" hidden>조건에 맞는 문의가 없습니다.</div>
        <nav id="qnaPagination" class="qna-pagination" aria-label="문의 페이지"></nav>
      </section>
    </main>
  </div>

  <div id="qnaDrawerBackdrop" class="qna-drawer-backdrop" hidden></div>
  <aside id="qnaDrawer" class="qna-drawer" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="drawerTitle">
    <header><div><p class="admin-eyebrow">INQUIRY WORKSPACE</p><h2 id="drawerTitle">문의 처리</h2></div><button id="closeQnaDrawer" type="button" aria-label="문의 패널 닫기">×</button></header>
    <div id="qnaDrawerContent"></div>
  </aside>
  <div id="qnaToast" class="qna-toast" role="status" aria-live="polite" hidden></div>

  <script src="/js/data.js"></script><script src="/js/utils.js"></script><script src="/js/qna.js"></script><script src="/js/admin-activity.js"></script><script src="/js/admin-notifications.js"></script><script src="/admin/admin-layout.js?v=20260715-3"></script><script src="/admin/qna/list.js"></script>
</body>
</html>
