<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>리워드 관리 | MOMO COFFEE</title><link rel="stylesheet" href="/css/variables.css"><link rel="stylesheet" href="/admin/admin-layout.css"><link rel="stylesheet" href="/admin/rewards/list.css"></head><body data-admin-page="rewards"><div class="admin-app"><main class="admin-content"><header class="reward-page-head"><p class="admin-eyebrow">REWARD OPERATIONS</p><h1>리워드 관리</h1><p>전체 회원의 포인트와 쿠폰 처리 이력을 조회합니다.</p></header><section id="rewardStats" class="reward-stats"></section><section class="reward-action-panel"><header><div><p class="admin-eyebrow">REWARD ACTION</p><h2>회원 리워드 처리</h2></div><a id="selectedMemberDetail" href="/admin/members/list.html">회원 상세 보기</a></header><label class="reward-member-select">대상 회원<select id="rewardMember"><option value="">회원을 선택해주세요</option></select></label><div class="reward-action-grid"><form id="rewardPointForm"><h3>포인트 지급·차감</h3><div class="quick-reward-points"><button type="button" data-value="500">500P</button><button type="button" data-value="1000">1,000P</button><button type="button" data-value="3000">3,000P</button><button type="button" data-value="5000">5,000P</button></div><label>처리 포인트<input name="amount" type="number" min="1" max="100000" required></label><label>처리 사유<input name="reason" maxlength="100" required></label><div class="reward-action-buttons"><button type="submit" value="EARN">포인트 지급</button><button class="deduct" type="submit" value="DEDUCT">포인트 차감</button></div></form><form id="rewardCouponForm"><h3>쿠폰 지급</h3><label>쿠폰<select name="template"><option value="1000">1,000원 할인 쿠폰</option><option value="3000">3,000원 할인 쿠폰</option><option value="10">음료 10% 할인 쿠폰</option><option value="SIZE">무료 사이즈업 쿠폰</option><option value="BIRTHDAY">생일 무료 음료 쿠폰</option></select></label><label>유효기간<input name="expiresAt" type="date" required></label><label>지급 사유<input name="reason" maxlength="100" required></label><button type="submit">쿠폰 지급</button></form></div><p id="rewardActionNotice" role="status" aria-live="polite"></p></section><section class="reward-toolbar"><select id="typeFilter"><option value="">전체</option><option value="POINT_EARN">포인트 지급</option><option value="POINT_DEDUCT">포인트 차감</option><option value="COUPON_ISSUE">쿠폰 지급</option><option value="COUPON_REVOKE">쿠폰 회수</option></select><select id="periodFilter"><option value="all">전체 기간</option><option value="today">오늘</option><option value="7">최근 7일</option></select><select id="sortFilter"><option value="desc">최신순</option><option value="asc">오래된순</option></select><input id="rewardSearch" type="search" placeholder="회원명, 이메일, 사유 또는 쿠폰명 검색"></section><section class="reward-list-panel"><div id="rewardList"></div><nav id="rewardPagination" class="reward-pagination"></nav></section></main></div><script src="/js/admin-activity.js"></script><script src="/js/admin-notifications.js"></script><script src="/admin/admin-layout.js"></script><script src="/js/rewards.js"></script><script src="/admin/rewards/list.js"></script></body></html>
