<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>운영 설정 | MOMO COFFEE</title><link rel="stylesheet" href="/css/variables.css"><link rel="stylesheet" href="/admin/admin-layout.css"><link rel="stylesheet" href="/admin/settings/index.css"></head>
<body data-admin-page="settings"><div class="admin-app"><main class="admin-content settings-page">
  <header class="settings-head"><div><p class="admin-eyebrow">OPERATION SETTINGS</p><h1>운영 설정</h1><p>고객 화면과 주문 운영 상태를 안전하게 관리합니다.</p></div><div class="settings-state"><span id="settingsStateDot"></span><div><small>현재 운영 상태</small><strong id="settingsStateText">확인 중</strong></div></div></header>
  <form id="settingsForm">
    <div class="settings-grid">
      <section class="settings-card"><header><span class="settings-icon">⌂</span><div><h2>매장 운영</h2><p>영업 상태와 주문 가능 시간을 설정합니다.</p></div></header><label class="switch-row"><span><b>매장 영업 상태</b><small>고객에게 영업 중으로 표시합니다.</small></span><input name="storeOpen" type="checkbox"><i aria-hidden="true"></i></label><div class="time-grid"><label><span>오픈 시간</span><input name="open" type="time"></label><label><span>마감 시간</span><input name="close" type="time"></label><label><span>라스트 오더</span><input name="lastOrderTime" type="time"></label></div></section>
      <section class="settings-card"><header><span class="settings-icon">♨</span><div><h2>주문 설정</h2><p>온라인 주문과 픽업 제공 여부를 관리합니다.</p></div></header><label class="switch-row"><span><b>온라인 주문</b><small>결제 페이지 진입과 주문 접수를 허용합니다.</small></span><input name="orderEnabled" type="checkbox"><i aria-hidden="true"></i></label><label class="switch-row"><span><b>픽업 주문</b><small>매장 픽업 주문을 고객에게 제공합니다.</small></span><input name="pickupEnabled" type="checkbox"><i aria-hidden="true"></i></label><label class="switch-row is-warning"><span><b>사이트 점검 모드</b><small>관리자를 제외한 고객 주문을 중지합니다.</small></span><input name="maintenanceMode" type="checkbox"><i aria-hidden="true"></i></label></section>
      <section class="settings-card"><header><span class="settings-icon">◇</span><div><h2>홈페이지 노출</h2><p>메인 화면에 표시할 콘텐츠를 선택합니다.</p></div></header><label class="switch-row"><span><b>메인 Hero 배너</b><small>첫 화면의 시즌 캠페인 영역</small></span><input name="heroBannerEnabled" type="checkbox"><i aria-hidden="true"></i></label><label class="switch-row"><span><b>시즌 메뉴</b><small>시즌 컬렉션과 추천 메뉴 영역</small></span><input name="seasonMenuEnabled" type="checkbox"><i aria-hidden="true"></i></label><label class="switch-row"><span><b>이벤트 섹션</b><small>진행 중인 브랜드 이벤트 영역</small></span><input name="eventSectionEnabled" type="checkbox"><i aria-hidden="true"></i></label><label class="switch-row"><span><b>앱 프로모션</b><small>MOMO 앱 안내 및 혜택 영역</small></span><input name="appPromotionEnabled" type="checkbox"><i aria-hidden="true"></i></label></section>
      <section class="settings-card notice-card"><header><span class="settings-icon">i</span><div><h2>운영 공지</h2><p>고객 화면 상단에 중요한 안내를 표시합니다.</p></div></header><label class="notice-field"><span>공지 메시지</span><textarea name="noticeMessage" maxlength="300" placeholder="예: 오늘은 매장 점검으로 20시에 조기 마감합니다."></textarea><small><span id="noticeCount">0</span> / 300자 · 입력하지 않으면 공지 바가 표시되지 않습니다.</small></label><div class="notice-preview"><b>미리보기</b><p id="noticePreview">등록된 운영 공지가 없습니다.</p></div></section>
    </div>
    <footer class="settings-actions"><div><strong>변경 사항을 확인하셨나요?</strong><span id="settingsNotice" aria-live="polite">저장 전에는 고객 화면에 반영되지 않습니다.</span></div><button type="submit">변경 사항 저장</button></footer>
  </form>
</main></div><script src="/js/admin-activity.js"></script><script src="/js/admin-settings.js"></script><script src="/js/admin-notifications.js"></script><script src="/admin/admin-layout.js"></script><script src="/admin/settings/index.js"></script></body></html>
